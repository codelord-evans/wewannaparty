services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wwp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wwp_dev_change_me}
      POSTGRES_DB: wewannaparty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wwp -d wewannaparty"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: postgres://wwp:${POSTGRES_PASSWORD:-wwp_dev_change_me}@postgres:5432/wewannaparty
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-to-a-long-random-secret-32+}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4321,http://127.0.0.1:4321}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      INVENTORY_HOLD_TTL_SEC: ${INVENTORY_HOLD_TTL_SEC:-600}
      APP_URL: ${APP_URL:-http://localhost:4321}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8787}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-WeWannaParty <onboarding@resend.dev>}
    ports:
      - "8787:8787"
    entrypoint: ["/bin/sh", "/app/server/docker-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:
