services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wwp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wwp_dev_change_me}
      POSTGRES_DB: wewannaparty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wwp -d wewannaparty"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--maxmemory",
        "512mb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--requirepass",
        "${REDIS_PASSWORD:-wwp_redis_change_me}",
      ]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-wwp_redis_change_me}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 768M

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_URL: postgres://wwp:${POSTGRES_PASSWORD:-wwp_dev_change_me}@postgres:5432/wewannaparty
      REDIS_URL: redis://:${REDIS_PASSWORD:-wwp_redis_change_me}@redis:6379/0
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-me-to-a-long-random-secret-32+}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4321,http://127.0.0.1:4321}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      INVENTORY_HOLD_TTL_SEC: ${INVENTORY_HOLD_TTL_SEC:-600}
      APP_URL: ${APP_URL:-http://localhost:4321}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8787}
      PAYSTACK_SECRET_KEY: ${PAYSTACK_SECRET_KEY:-}
      PAYSTACK_PUBLIC_KEY: ${PAYSTACK_PUBLIC_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-WeWannaParty <onboarding@resend.dev>}
    ports:
      - "8787:8787"
    entrypoint: ["/bin/sh", "/app/server/docker-entrypoint.sh"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8787/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

volumes:
  postgres_data:
  redis_data:
