# WeWannaParty API on Render
# Postgres: Supabase (free) — set DATABASE_URL manually
# Redis: Render Key Value (or Upstash) — linked below or set REDIS_URL manually
#
# Dashboard → New → Blueprint → connect this repo
# Or: New → Web Service (Docker) + New → Key Value

services:
  - type: keyvalue
    name: wwp-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # private — API on same Render account

  - type: web
    name: wwp-api
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      # From Supabase → Project Settings → Database → Connection string
      # Use "Transaction" pooler URI (port 6543) for the running API
      - key: DATABASE_URL
        sync: false
      # Optional: Supabase "Session" / direct URI (port 5432) for migrations
      - key: DATABASE_MIGRATE_URL
        sync: false
      - key: REDIS_URL
        fromService:
          name: wwp-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: INVENTORY_HOLD_TTL_SEC
        value: "600"
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
