# WeWannaParty API — Render Blueprint
# Dashboard → New → Blueprint → connect this GitHub repo
# After create, set APP_URL, CORS_ORIGINS, RESEND_API_KEY, EMAIL_FROM (and Paystack if live).

databases:
  - name: wwp-postgres
    plan: free
    postgresMajorVersion: "16"
    databaseName: wewannaparty
    user: wwp

services:
  - type: keyvalue
    name: wwp-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: [] # private network only (API on same Render account)

  - type: web
    name: wwp-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wwp-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: wwp-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 15m
      - key: JWT_REFRESH_TTL
        value: 7d
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX
        value: "120"
      - key: INVENTORY_HOLD_TTL_SEC
        value: "600"
      # Frontend origin(s), e.g. https://your-frontend.vercel.app,http://localhost:4321
      - key: APP_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Resend: https://resend.com/api-keys — verify a domain for production From:
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
      - key: PAYSTACK_PUBLIC_KEY
        sync: false
